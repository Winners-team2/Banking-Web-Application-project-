<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Password Reset</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        background: linear-gradient(135deg, #0a1f44, #142c5c, #0f2550);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .forgot-container {
        width: 420px;
        background: #ffffff;
        border-radius: 20px;
        padding: 45px 35px;
        box-shadow: 0 20px 50px rgba(200, 123, 17, 0.667);
        text-align: center;
        position: relative;
      }

      .bank-logo {
        font-size: 20px;
        font-weight: 600;
        color: rgba(199, 148, 53, 0.597);
        margin-bottom: 25px;
        letter-spacing: 1px;
      }

      .icon-circle {
        width: 75px;
        height: 75px;
        background: linear-gradient(135deg, #0a1f44, #c8a951);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0 auto 20px auto;
        color: white;
        font-size: 26px;
      }

      h2 {
        color: #0a1f44;
        margin-bottom: 10px;
        font-weight: 600;
      }

      .secure-text {
        font-size: 13px;
        color: #777;
        margin-bottom: 30px;
      }

      .input-box {
        position: relative;
        margin-bottom: 25px;
      }

      .input-box i {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: #0a1f44;
      }

      .input-box input {
        width: 100%;
        padding: 14px 14px 14px 45px;
        border-radius: 10px;
        border: 1px solid #ccc;
        font-size: 14px;
        transition: 0.3s;
      }

      .input-box input:focus {
        border-color: #0a1f44;
        outline: none;
        box-shadow: 0 0 0 3px rgba(10, 31, 68, 0.15);
      }

      .btn {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #0a1f44, #142c5c);
        color: white;
        font-weight: 500;
        cursor: pointer;
        transition: 0.3s;
      }

      .btn:hover {
        background: linear-gradient(135deg, #142c5c, #0a1f44);
        transform: translateY(-2px);
      }

      .back-login {
        margin-top: 20px;
        font-size: 14px;
      }

      .back-login a {
        text-decoration: none;
        color: #c8a951;
        font-weight: 500;
      }

      .back-login a:hover {
        text-decoration: underline;
      }

      .security-note {
        margin-top: 25px;
        font-size: 11px;
        color: #888;
        line-height: 1.6;
      }

      .footer-secure {
        margin-top: 15px;
        font-size: 11px;
        color: #0a1f44;
        font-weight: 500;
      }
    </style>
  </head>

  <body>
    <div class="forgot-container">
      <div class="bank-logo">Winners Bank</div>

      <div class="icon-circle">
        <i class="fa fa-shield-halved"></i>
      </div>

      <h2>Secure Password Recovery</h2>

      <p class="secure-text">
        Enter your registered email address to receive a secure password reset
        link.
      </p>

      <form>
        <div class="input-box">
          <i class="fa fa-envelope"></i>
          <input type="email" placeholder="Registered Email Address" required />
        </div>

        <button type="submit" class="btn">Send Secure Reset Link</button>

        <p class="back-login">
          <a href="login.html">Return to Secure Login</a>
        </p>
      </form>

      <div class="security-note">
        For your protection, the reset link will expire shortly. Never share
        your banking credentials with anyone.
      </div>

      <div class="footer-secure">🔒 256-bit SSL Secured Connection</div>
    </div>
    <script>
  document.querySelector("form").addEventListener("submit", async function (e) {
    e.preventDefault();

    const email = document.querySelector("input[type='email']").value.trim();

    if (!email) {
      alert("Please enter your email.");
      return;
    }

    try {
      const response = await fetch("https://localhost:7079/api/Auth/forgot-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: email })
      });

      const data = await response.json();

      // Show full response for debugging
      console.log("Response status:", response.status);
      console.log("Response data:", data);

      if (response.ok) {
        // Save email in localStorage
        localStorage.setItem('resetEmail', email);
        
        // Check if token exists in response
        if (data.token) {
          localStorage.setItem('resetToken', data.token);
          alert("Reset token received! Redirecting...");
          window.location.href = "reset-password.html";
        } else {
          // If no token, show the response to understand the API
          alert("No token received. API response: " + JSON.stringify(data));
        }
      } else {
        alert("Error: " + (data.message || data.title || "Something went wrong"));
      }
    } catch (error) {
      alert("Network error: " + error.message);
    }
  });
</script>
  </body>
</html>
