<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a1f44, #142c5c, #0f2550);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .reset-container {
            width: 420px;
            background: #ffffff;
            border-radius: 20px;
            padding: 45px 35px;
            box-shadow: 0 20px 50px rgba(200, 123, 17, 0.667);
            text-align: center;
            position: relative;
        }

        .bank-logo {
            font-size: 20px;
            font-weight: 600;
            color: rgba(199, 148, 53, 0.597);
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .icon-circle {
            width: 75px;
            height: 75px;
            background: linear-gradient(135deg, #0a1f44, #c8a951);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px auto;
            color: white;
            font-size: 26px;
        }

        h2 {
            color: #0a1f44;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .secure-text {
            font-size: 13px;
            color: #777;
            margin-bottom: 30px;
        }

        .input-box {
            position: relative;
            margin-bottom: 25px;
        }

        .input-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #0a1f44;
        }

        .input-box input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 14px;
            transition: 0.3s;
        }

        .input-box input:focus {
            border-color: #0a1f44;
            outline: none;
            box-shadow: 0 0 0 3px rgba(10, 31, 68, 0.15);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #0a1f44, #142c5c);
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: linear-gradient(135deg, #142c5c, #0a1f44);
            transform: translateY(-2px);
        }

        .back-login {
            margin-top: 20px;
            font-size: 14px;
        }

        .back-login a {
            text-decoration: none;
            color: #c8a951;
            font-weight: 500;
        }

        .back-login a:hover {
            text-decoration: underline;
        }

        .security-note {
            margin-top: 25px;
            font-size: 11px;
            color: #888;
            line-height: 1.6;
        }

        .footer-secure {
            margin-top: 15px;
            font-size: 11px;
            color: #0a1f44;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="bank-logo">Winners Bank</div>

        <div class="icon-circle">
            <i class="fa fa-lock"></i>
        </div>

        <h2>Reset Password</h2>

        <p class="secure-text">
            Enter your email, reset token, and new password.
        </p>

        <form id="resetForm">
            <div class="input-box">
                <i class="fa fa-envelope"></i>
                <input type="email" id="email" placeholder="Email Address" required />
            </div>

            <div class="input-box">
                <i class="fa fa-key"></i>
                <input type="text" id="token" placeholder="Reset Token" required />
            </div>

            <div class="input-box">
                <i class="fa fa-lock"></i>
                <input type="password" id="newPassword" placeholder="New Password" required />
            </div>

            <div class="input-box">
                <i class="fa fa-check-circle"></i>
                <input type="password" id="confirmPassword" placeholder="Confirm New Password" required />
            </div>

            <button type="submit" class="btn">Reset Password</button>

            <p class="back-login">
                <a href="login.html">← Back to Login</a>
            </p>
        </form>

        <div class="security-note">
            For your protection, the reset token will expire shortly. Never share
            your banking credentials with anyone.
        </div>

        <div class="footer-secure">🔒 256-bit SSL Secured Connection</div>
    </div>

    <script>
        // جلب البيانات من localStorage (من forgot page)
        const savedEmail = localStorage.getItem('resetEmail');
        const savedToken = localStorage.getItem('resetToken');
        
        if (savedEmail) {
            document.getElementById('email').value = savedEmail;
        }
        if (savedToken) {
            document.getElementById('token').value = savedToken;
        }

        // لو في token في الرابط، حطه في الحقل تلقائي (كبديل)
        const urlParams = new URLSearchParams(window.location.search);
        const tokenFromUrl = urlParams.get('token');
        if (tokenFromUrl && !savedToken) {
            document.getElementById('token').value = tokenFromUrl;
        }

        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const token = document.getElementById('token').value.trim();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!email || !token || !newPassword || !confirmPassword) {
                alert('❌ Please fill in all fields');
                return;
            }

            if (newPassword !== confirmPassword) {
                alert('❌ Passwords do not match');
                return;
            }

            if (newPassword.length < 6) {
                alert('❌ Password must be at least 6 characters');
                return;
            }

            try {
                const response = await fetch('https://localhost:7079/api/Auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: email,
                        token: token,
                        newPassword: newPassword
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('✅ Password reset successful! Please login with your new password.');
                    localStorage.removeItem('resetEmail');
                    localStorage.removeItem('resetToken');
                    window.location.href = 'login.html';
                } else {
                    alert('❌ ' + (data.message || data.title || 'Reset failed'));
                }
            } catch (error) {
                alert('❌ Network error: ' + error.message);
            }
        });
    </script>
</body>
</html>
