<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Customer Support</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }
      :root {
        --color-white: #ffffff;
        --color-light: #f0eff5;
        --color-gray-light: #86848c;
        --color-gray-dark: #56555e;
        --color-dark: #27282f;
        --color-primary: #24086d;
        --color-primary-light: rgba(204, 153, 76, 0.607);
        --color-success: #22ca4b;
        --color-success-light: rgba(34, 202, 75, 0.15);
        --color-danger: #ff4336;
        --color-danger-light: rgba(255, 67, 54, 0.15);
        --color-warning: #eab507;
        --color-warning-light: rgba(234, 181, 7, 0.15);
        --color-purple: #a063f5;
        --color-purple-light: rgba(160, 99, 245, 0.15);
        --card-border-radius: 1.6rem;
        --border-radius-1: 1rem;
        --border-radius-2: 6px;
        --card-padding: 1.6rem;
        --sidebar-width: 220px;
        --background-color: rgba(199, 148, 53, 0.597);
      }

      
      body {
        background: linear-gradient(135deg, #0a1f44, #142c5c, #0f2550);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 40px 20px;
        overflow-y: auto;
      }

      .support-container {
        width: 480px;
      }

      /* ✅ Scroll */
      .support-card {
        background: #ffffff;
        padding: 40px 35px;
        border-radius: 20px;
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.25);
        max-height: 90vh;
        overflow-y: auto;
      }

      /* Scroll Profissional */
      .support-card::-webkit-scrollbar {
        width: 6px;
      }

      .support-card::-webkit-scrollbar-thumb {
        background: #c8a951;
        border-radius: 10px;
      }

      .bank-header {
        text-align: center;
        font-size: 20px;
        font-weight: 600;
        color: rgba(131, 92, 21, 0.597);
        margin-bottom: 25px;
      }

      .icon-circle {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #0a1f44, rgba(199, 148, 53, 0.597));
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0 auto 20px auto;
        color: white;
        font-size: 28px;
      }

      h2 {
        text-align: center;
        color: #0a1f44;
        margin-bottom: 10px;
      }

      .secure-text {
        text-align: center;
        font-size: 13px;
        color: #777;
        margin-bottom: 25px;
      }

      .input-group {
        margin-bottom: 18px;
        position: relative;
      }

      .input-group i {
        position: absolute;
        left: 15px;
        top: 14px;
        color: #0a1f44;
      }

      .input-group input,
      .input-group textarea {
        width: 100%;
        padding: 14px 14px 14px 45px;
        border-radius: 10px;
        border: 1px solid #ccc;
        font-size: 14px;
        transition: 0.3s;
      }

      .input-group textarea {
        resize: none;
        height: 120px;
      }

      .input-group input:focus,
      .input-group textarea:focus {
        border-color: #0a1f44;
        outline: none;
        box-shadow: 0 0 0 3px rgba(10, 31, 68, 0.15);
      }

      .btn {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 10px;
        font-weight: 500;
        cursor: pointer;
        margin-bottom: 12px;
        transition: 0.3s;
      }

      .primary-btn {
        background: linear-gradient(135deg, #0a1f44, #142c5c);
        color: white;
      }

      .primary-btn:hover {
        transform: translateY(-2px);
      }

      .secondary-btn {
        background: #c8a951;
        color: white;
      }

      .secondary-btn:hover {
        opacity: 0.9;
      }

      .security-note {
        margin-top: 15px;
        font-size: 12px;
        color: #777;
        text-align: center;
      }

      .footer-secure {
        margin-top: 12px;
        text-align: center;
        font-size: 11px;
        color: #0a1f44;
        font-weight: 500;
      }

      .success-message {
        display: none;
        text-align: center;
        font-size: 14px;
        color: green;
        margin-bottom: 15px;
      }
    </style>
  </head>

  <body>
    <div class="support-container">
      <div class="support-card">
        <div class="bank-header">Winners Bank</div>

        <div class="icon-circle">
          <i class="fa fa-headset"></i>
        </div>

        <h2>Secure Customer Assistance</h2>

        <p class="secure-text">
          Submit your inquiry securely. Our banking specialists will respond
          promptly.
        </p>

        <div class="success-message" id="successMsg">
          Your request has been submitted securely.
        </div>

        <form id="supportForm">
          <div class="input-group">
            <i class="fa fa-tag"></i>
            <input
              type="text"
              id="subject"
              placeholder="Subject of Inquiry"
              required
            />
          </div>

          <div class="input-group">
            <i class="fa fa-pen"></i>
            <textarea
              id="message"
              placeholder="Describe your issue in detail"
              required
            ></textarea>
          </div>

          <button type="submit" class="btn primary-btn">
            Submit Secure Request
          </button>

          <button type="button" class="btn secondary-btn" onclick="location.href='index.html'">
  Back to Dashboard
</button>
        </form>

        <div class="security-note">
          For your safety, do not include passwords, PINs, or card numbers in
          your message.
        </div>

        <div class="footer-secure">🔒 End-to-End Encrypted Support Channel</div>
      </div>
    </div>

    <script>
  // Check if user is logged in
  const token = localStorage.getItem("token");
  
  // Function to check if user can access dashboard
  function canAccessDashboard() {
    return token !== null;
  }

  // Handle Back to Dashboard button
  function goProfile() {
    if (canAccessDashboard()) {
      window.location.href = "index.html";
    } else {
      window.location.href = "login.html";
    }
  }

  // If not logged in, still can access support page but Back button will go to login
  // (optional: redirect to login if you want to block support page completely)
  // if (!token) {
  //   window.location.href = "login.html";
  // }

  // Handle support form submission
  document.getElementById("supportForm").addEventListener("submit", async function (e) {
    e.preventDefault();

    const subject = document.getElementById("subject").value.trim();
    const message = document.getElementById("message").value.trim();

    if (!subject || !message) {
      alert("Please fill in all fields.");
      return;
    }

    // If logged in, send with token
    if (token) {
      try {
        const response = await fetch("https://localhost:7079/api/Support/tickets", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({ subject: subject, message: message })
        });

        if (response.ok) {
          showSuccess();
        } else {
          alert("Failed to submit request. Please try again.");
        }
      } catch (error) {
        alert("Network error: " + error.message);
      }
    } else {
      // Not logged in - save locally or just show success
      showSuccess();
    }
  });

  function showSuccess() {
    const successMsg = document.getElementById("successMsg");
    successMsg.style.display = "block";
    document.getElementById("supportForm").reset();
    setTimeout(() => {
      successMsg.style.display = "none";
    }, 3000);
  }
</script>
  </body>
</html>
